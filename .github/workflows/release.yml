name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  release-x86_64:
    name: Build and release x86_64 Linux binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libudev-dev pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binaries
        run: cargo build --release --locked

      - name: Strip binaries
        run: |
          strip target/release/serial-mcp-server
          strip target/release/serial-mcp-server-http

      - name: Rename binaries with version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          cp target/release/serial-mcp-server "serial-mcp-server-${VERSION}-x86_64-linux"
          cp target/release/serial-mcp-server-http "serial-mcp-server-http-${VERSION}-x86_64-linux"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            serial-mcp-server-*-x86_64-linux
            serial-mcp-server-http-*-x86_64-linux
